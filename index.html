<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Knowbrand</title>

<style>

/* GLOBAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:black;
color:white;
line-height:1.5;
}

/* INTRO SCREEN */

#intro-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:3000;
}

#intro-screen h1{
font-size:40px;
letter-spacing:4px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:0.3;}
50%{opacity:1;}
100%{opacity:0.3;}
}

/* NAVBAR */

nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
z-index:1000;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
transition:0.3s;
}

nav.scrolled{
background:black;
}

.logo{
font-size:20px;
font-weight:bold;
text-decoration:none;
color:white;
}

/* NAV LINKS */

.navlinks{
display:flex;
gap:30px;
}

.navlinks a{
color:white;
text-decoration:none;
font-size:14px;
position:relative;
}

.navlinks a::after{
content:"";
position:absolute;
left:0;
bottom:-4px;
width:0;
height:1px;
background:white;
transition:0.3s;
}

.navlinks a:hover::after{
width:100%;
}

/* MOBILE MENU */

.menu-btn{
display:none;
font-size:24px;
cursor:pointer;
}

/* HERO */

#home{

height:90vh;

background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.55)),
url("https://images.unsplash.com/photo-1523381294911-8d3cead13475?q=80&w=1600&auto=format&fit=crop");

background-size:cover;
background-position:center 30%;
background-attachment:fixed;

display:flex;
align-items:center;
justify-content:center;
text-align:center;

padding:20px;

}

/* HERO BOX */

.hero-box{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(8px);
padding:30px;
border-radius:12px;
}

h1{
font-size:56px;
letter-spacing:3px;
margin-bottom:10px;
}

.hero-box p{
margin-bottom:20px;
}

button{
padding:10px 22px;
border:none;
background:white;
color:black;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(255,255,255,0.2);
}

/* SECTION */

.section{
padding:100px 60px;
}

.section h2{
font-size:24px;
margin-bottom:30px;
}

.section h2::after{
content:"";
display:block;
width:40px;
height:2px;
background:white;
margin-top:10px;
}

/* PRODUCT GRID */

.drop-container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.product-card{
position:relative;
overflow:hidden;
border-radius:10px;
cursor:pointer;
transition:0.4s;
opacity:0;
transform:translateY(40px);
}

.product-card.show{
opacity:1;
transform:translateY(0);
}

.product-card img{
width:100%;
height:220px;
object-fit:cover;
transition:0.6s;
}

.product-card:hover img{
transform:scale(1.12);
filter:brightness(0.7);
}

.product-card:hover{
transform:translateY(-8px);
}

.product-name{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
font-size:14px;
letter-spacing:1px;
opacity:0;
transition:0.3s;
}

.product-card:hover .product-name{
opacity:1;
}

/* INSTAGRAM */

.insta-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.insta-grid img{
width:100%;
height:220px;
object-fit:cover;
transition:0.5s;
cursor:pointer;
}

.insta-grid img:hover{
transform:scale(1.08);
}

/* ABOUT */

.about-contact{
padding:100px 60px;
max-width:800px;
}

.contact-info{
margin-top:20px;
}

.contact-info p{
margin:6px 0;
}

/* FOOTER */

footer{
background:black;
padding:40px;
text-align:center;
border-top:1px solid rgba(255,255,255,0.1);
}

footer p{
margin:6px 0;
font-size:14px;
opacity:0.8;
}

/* MOBILE */

@media (max-width:768px){

nav{
padding:12px 20px;
}

.menu-btn{
display:block;
}

.navlinks{
position:absolute;
top:60px;
left:0;
width:100%;
background:black;
flex-direction:column;
align-items:center;
gap:20px;
padding:20px 0;
display:none;
}

.navlinks.active{
display:flex;
}

h1{
font-size:36px;
}

#home{
margin-top:60px;
height:56.25vw;
background-attachment:scroll;
}

.drop-container{
grid-template-columns:1fr 1fr;
}

.insta-grid{
grid-template-columns:1fr 1fr;
}

.section{
padding:60px 20px;
}

.about-contact{
padding:60px 20px;
}

}

</style>

<script>

window.addEventListener("load",function(){
setTimeout(function(){
document.getElementById("intro-screen").style.display="none";
},3000);
});

function toggleMenu(){
const nav=document.getElementById("navlinks");
nav.classList.toggle("active");
}

window.addEventListener("scroll",function(){

const nav=document.querySelector("nav");

if(window.scrollY>50){
nav.classList.add("scrolled");
}else{
nav.classList.remove("scrolled");
}

});

window.addEventListener("scroll",function(){

const cards=document.querySelectorAll(".product-card");

cards.forEach(card=>{

const position=card.getBoundingClientRect().top;
const screen=window.innerHeight;

if(position < screen - 100){
card.classList.add("show");
}

});

});

function comingSoon(){
alert("Knowbrand is launching soon. Stay tuned.");
}

</script>

</head>

<body>

<div id="intro-screen">
<h1>Knowbrand</h1>
</div>

<nav>

<a href="/" class="logo">Knowbrand</a>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="navlinks" id="navlinks">
<a href="/">Home</a>
<a href="/about">About</a>
<a href="/contact">Contact</a>
</div>

</nav>

<section id="home">

<div class="hero-box">
<h1>Knowbrand</h1>
<p>A modern clothing brand built around identity and creativity.</p>
<button onclick="comingSoon()">Coming Soon</button>
</div>

</section>

<!-- rest of your code unchanged -->

</body>
</html>
